<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}个人股票分析系统{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        colors: {
          primary: '#135bec',
          surface: { DEFAULT: '#101622', card: '#161d2b', hover: '#1e2738' },
        },
        fontFamily: { display: ['Manrope', 'sans-serif'] },
      }}
    }
  </script>
  <style>
    body { font-family: 'Manrope', sans-serif; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #135bec33; border-radius: 10px; }
    .glass-panel { background: rgba(22, 29, 43, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    .card { background: #161d2b; border: 1px solid rgba(100,116,139,0.2); border-radius: 12px; padding: 1.25rem; }
    .card-hover:hover { border-color: #135bec; transition: border-color 0.2s; }
    .badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
    .progress-bar { height: 8px; border-radius: 4px; background: rgba(100,116,139,0.2); overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .timeline-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .left-border-card { border-left: 3px solid; padding-left: 12px; margin-bottom: 10px; }
    .tab-active { border-bottom: 2px solid #135bec; color: #135bec; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #64748b; }
    .tab-inactive:hover { color: #94a3b8; }
    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body class="bg-surface text-slate-100 min-h-screen font-display">
  <div class="flex min-h-screen">
    <!-- 侧边栏 (icon-only) -->
    <aside class="fixed left-0 top-0 h-full w-20 flex flex-col items-center py-8 bg-surface-card border-r border-slate-800 z-50">
      <div class="mb-10 text-primary">
        <span class="material-icons-round text-4xl">insights</span>
      </div>
      <nav class="flex flex-col gap-8">
        <a href="/overview" title="每日概览" class="{{ 'text-primary' if active_page == 'overview' else 'text-slate-400 hover:text-primary' }} transition-colors">
          <span class="material-icons-round">dashboard</span>
        </a>
        <a href="/hotspot" title="热点研究" class="{{ 'text-primary' if active_page == 'hotspot' else 'text-slate-400 hover:text-primary' }} transition-colors">
          <span class="material-icons-round">radar</span>
        </a>
        <a href="/market" title="市场总览" class="{{ 'text-primary' if active_page == 'market' else 'text-slate-400 hover:text-primary' }} transition-colors">
          <span class="material-icons-round">show_chart</span>
        </a>
        <a href="/stock" title="个股研究" class="{{ 'text-primary' if active_page == 'stock' else 'text-slate-400 hover:text-primary' }} transition-colors">
          <span class="material-icons-round">account_tree</span>
        </a>
        <a href="/data" title="数据管理" class="{{ 'text-primary' if active_page == 'data' else 'text-slate-400 hover:text-primary' }} transition-colors">
          <span class="material-icons-round">auto_awesome</span>
        </a>
        <a href="/kg" title="知识图谱" class="{{ 'text-primary' if active_page == 'kg' else 'text-slate-400 hover:text-primary' }} transition-colors">
          <span class="material-icons-round">hub</span>
        </a>
        <a href="/settings" title="系统设置" class="{{ 'text-primary' if active_page == 'settings' else 'text-slate-400 hover:text-primary' }} transition-colors">
          <span class="material-icons-round">settings</span>
        </a>
      </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="ml-20 flex-1 overflow-y-auto p-8">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- 全局研究任务浮窗 -->
  <div id="globalTaskWidget" class="fixed bottom-4 left-24 z-40 hidden">
    <div class="bg-surface-card border border-slate-700 rounded-xl shadow-2xl w-72 overflow-hidden">
      <div class="flex items-center justify-between px-3 py-2 border-b border-slate-800 cursor-pointer" onclick="toggleTaskList()">
        <span class="text-xs font-bold text-slate-300 flex items-center gap-1.5">
          <span class="material-icons-round text-sm text-primary">science</span>
          研究任务
          <span id="gtw-count" class="bg-primary/20 text-primary text-[10px] px-1.5 rounded-full font-bold">0</span>
        </span>
        <span class="material-icons-round text-sm text-slate-500" id="gtw-toggle">expand_less</span>
      </div>
      <div id="gtw-list" class="max-h-48 overflow-y-auto"></div>
    </div>
  </div>

  {% block scripts %}{% endblock %}

  <script>
  // 全局任务轮询
  let _gtwCollapsed = false;
  function toggleTaskList() {
    _gtwCollapsed = !_gtwCollapsed;
    document.getElementById('gtw-list').classList.toggle('hidden', _gtwCollapsed);
    document.getElementById('gtw-toggle').textContent = _gtwCollapsed ? 'expand_more' : 'expand_less';
  }
  function _pollGlobalTasks() {
    fetch('/stock/api/research-tasks').then(r => r.json()).then(tasks => {
      const widget = document.getElementById('globalTaskWidget');
      if (!tasks || tasks.length === 0) { widget.classList.add('hidden'); return; }
      widget.classList.remove('hidden');
      document.getElementById('gtw-count').textContent = tasks.filter(t => t.status === 'running').length || '';
      const list = document.getElementById('gtw-list');
      if (_gtwCollapsed) return;
      list.innerHTML = tasks.map(t => {
        const icon = t.status === 'done' ? 'check_circle' : t.status === 'error' ? 'error' : 'refresh';
        const iconCls = t.status === 'done' ? 'text-emerald-400' : t.status === 'error' ? 'text-red-400' : 'text-primary animate-spin';
        const barCls = t.status === 'done' ? 'bg-emerald-500' : t.status === 'error' ? 'bg-red-500' : 'bg-primary';
        return `<div class="px-3 py-2 border-b border-slate-800/50 last:border-0">
          <div class="flex items-center gap-2 mb-1">
            <span class="material-icons-round text-xs ${iconCls}">${icon}</span>
            <a href="/stock/${t.stock_code}" class="text-xs text-blue-400 hover:underline font-bold">${t.stock_code}</a>
            <span class="text-xs text-slate-400">${t.stock_name}</span>
            <span class="text-[10px] text-slate-600 ml-auto">${t.progress}%</span>
          </div>
          <div class="w-full bg-slate-800 rounded-full h-1">
            <div class="${barCls} h-1 rounded-full transition-all duration-500" style="width:${t.progress}%"></div>
          </div>
          <div class="text-[10px] text-slate-600 mt-0.5 truncate">${t.message || ''}</div>
        </div>`;
      }).join('');
    }).catch(function(){});
  }
  setInterval(_pollGlobalTasks, 3000);
  _pollGlobalTasks();
  </script>
</body>
</html>
