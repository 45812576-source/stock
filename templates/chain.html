{% extends "base.html" %}
{% block title %}产业链全景 — 个人股票分析系统{% endblock %}

{% block extra_styles %}
<style>
.chain-card {
  background: #111827;
  border: 1px solid rgba(45,55,72,.8);
  border-radius: 16px;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s, transform .15s;
  cursor: pointer;
}
.chain-card:hover {
  border-color: #135bec;
  box-shadow: 0 0 0 1px #135bec22, 0 8px 32px rgba(19,91,236,.08);
  transform: translateY(-2px);
}
.tab-btn { padding:6px 16px; border-radius:8px; font-size:13px; font-weight:600; transition:all .15s; }
.tab-btn.active { background:#135bec; color:#fff; }
.tab-btn:not(.active) { color:#64748b; }
.tab-btn:not(.active):hover { color:#94a3b8; background:rgba(255,255,255,.05); }
</style>
{% endblock %}

{% block content %}
<div class="p-6">

  <!-- Header -->
  <header class="flex justify-between items-center mb-6">
    <div>
      <nav class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-1">股票分析系统 / 产业链</nav>
      <h1 class="text-3xl font-extrabold tracking-tight">产业链全景</h1>
    </div>
    <!-- Tab 切换 -->
    <div class="flex items-center gap-2 bg-slate-800/60 rounded-xl p-1 border border-slate-700/40">
      <button class="tab-btn active" id="tab-all" onclick="switchTab('all')">
        <span class="material-icons-round text-sm align-middle mr-1">hub</span>全部产业链
      </button>
      <button class="tab-btn" id="tab-watch" onclick="switchTab('watch')">
        <span class="material-icons-round text-sm align-middle mr-1">bookmark</span>待观察
      </button>
    </div>
  </header>

  <!-- 加载骨架 -->
  <div id="loadingState" class="grid grid-cols-3 gap-5">
    {% for _ in range(6) %}
    <div class="chain-card p-5 animate-pulse">
      <div class="h-5 bg-slate-700 rounded w-2/3 mb-3"></div>
      <div class="h-16 bg-slate-700/50 rounded mb-3"></div>
      <div class="h-3 bg-slate-700 rounded w-1/2"></div>
    </div>
    {% endfor %}
  </div>

  <!-- 卡片容器 -->
  <div id="chainGrid" class="grid grid-cols-3 gap-5 hidden"></div>

  <!-- 空状态 -->
  <div id="emptyState" class="hidden text-center py-20">
    <span class="material-icons-round text-5xl text-slate-700 mb-4 block">bookmark_border</span>
    <p class="text-slate-500 text-sm">待观察列表暂无产业链</p>
    <p class="text-slate-600 text-xs mt-1">在产业链详情页将股票加入待观察后会出现在这里</p>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
let _currentTab = 'all';
let _allData = null;
let _watchData = null;

async function switchTab(tab) {
  _currentTab = tab;
  ['all','watch'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t === tab);
  });
  if (tab === 'all') {
    if (_allData) renderChains(_allData);
    else loadAll();
  } else {
    if (_watchData) renderChains(_watchData, true);
    else loadWatch();
  }
}

async function loadAll() {
  try {
    const r = await fetch('/chain/api/list');
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    _allData = d.chains;
    renderChains(_allData);
  } catch(e) {
    console.error(e);
  }
}

async function loadWatch() {
  try {
    const r = await fetch('/chain/api/watchlist/list');
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    _watchData = d.chains;
    renderChains(_watchData, true);
  } catch(e) {
    console.error(e);
  }
}

function renderChains(chains, isWatch=false) {
  document.getElementById('loadingState').classList.add('hidden');
  const grid = document.getElementById('chainGrid');
  const empty = document.getElementById('emptyState');
  if (!chains || chains.length === 0) {
    grid.classList.add('hidden');
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  grid.classList.remove('hidden');
  grid.innerHTML = chains.map(c => buildCard(c)).join('');
}

function buildCard(c) {
  const color = c.color || '#6366f1';
  const flows = c.daily_flows || [];
  const dates = c.daily_dates || [];
  const totalFlow = flows.reduce((a, b) => a + b, 0);
  const flowPos = totalFlow >= 0;
  const flowColor = flowPos ? '#ef4444' : '#22c55e';
  const flowSign = flowPos ? '+' : '';

  // 资金流迷你柱图（绝对定位，正上负下，中线为基准）
  const maxAbs = Math.max(...flows.map(Math.abs), 0.01);
  const H = 48, MID = 24; // 总高48px，中线在24px
  const barHtml = flows.map((v, i) => {
    const barH = Math.max(3, Math.round((Math.abs(v) / maxAbs) * (MID - 2)));
    const [bg, top, radius] = v >= 0
      ? ['#ef444490', MID - barH, '2px 2px 0 0']
      : ['#22c55e90', MID,        '0 0 2px 2px'];
    const label = `${dates[i]||''}: ${v>=0?'+':''}${v.toFixed(2)}亿`;
    return `<div style="position:relative;flex:1;height:${H}px;">
      <div style="position:absolute;left:0;right:0;top:${top}px;height:${barH}px;background:${bg};border-radius:${radius};" title="${label}"></div>
    </div>`;
  }).join('');
  const flowChart = flows.length > 0
    ? `<div style="display:flex;gap:2px;height:${H}px;position:relative;">
        <div style="position:absolute;left:0;right:0;top:${MID}px;height:1px;background:rgba(100,116,139,0.25);pointer-events:none;"></div>
        ${barHtml}
       </div>`
    : `<div style="height:48px;display:flex;align-items:center;justify-content:center;color:#475569;font-size:11px;">暂无资金数据</div>`;

  // tier 行：key badge + label
  const tierRows = (c.tiers_summary || []).map(t =>
    `<div class="flex items-center gap-1.5">
      <span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;background:${color}18;color:${color};">${t.key}</span>
      <span style="font-size:11px;color:#64748b;">${t.label || ''}</span>
    </div>`
  ).join('');

  return `
  <div class="chain-card" onclick="window.location='/chain/${encodeURIComponent(c.name)}'">
    <!-- 顶部彩条 -->
    <div style="height:3px;background:${color};"></div>

    <div style="padding:16px 18px 14px;">
      <!-- 标题行 -->
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <div style="width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:${color}1a;flex-shrink:0;">
            <span class="material-icons-round" style="font-size:16px;color:${color};">${c.icon || 'hub'}</span>
          </div>
          <span style="font-weight:800;font-size:15px;">${c.name}</span>
        </div>
        <span style="font-size:10px;color:#64748b;background:#0f172a;border:1px solid #1e293b;border-radius:9999px;padding:2px 8px;">${c.stock_count || 0}只</span>
      </div>

      <!-- 资金流区块 -->
      <div style="background:#0a1020;border:1px solid #1e293b;border-radius:10px;padding:10px 12px;margin-bottom:12px;">
        <div class="flex items-center justify-between mb-2">
          <span style="font-size:10px;color:#475569;">近${dates.length || 7}日主力净流入</span>
          <span style="font-size:13px;font-weight:800;color:${flowColor};">${flowSign}${totalFlow.toFixed(2)} 亿</span>
        </div>
        ${flowChart}
        ${dates.length > 0 ? `<div class="flex justify-between mt-1"><span style="font-size:9px;color:#334155;">${dates[0]}</span><span style="font-size:9px;color:#334155;">${dates[dates.length-1]}</span></div>` : ''}
      </div>

      <!-- 产业链环节 -->
      <div style="display:flex;flex-direction:column;gap:5px;border-top:1px solid #1e293b;padding-top:11px;">
        ${tierRows}
      </div>
    </div>
  </div>`;
}

function isWatchDetail(c) {
  return _currentTab === 'watch';
}

// 初始化
loadAll();
</script>
{% endblock %}
